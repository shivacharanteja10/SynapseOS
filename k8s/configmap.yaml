apiVersion: v1
kind: ConfigMap
metadata:
  name: synapseos-config
  namespace: synapseos
data:
  APP_NAME: SynapseOS
  ENVIRONMENT: production
  API_PREFIX: /api/v1
  LOG_LEVEL: INFO
  LOG_JSON: "true"
  LLM_PROVIDER: openai
  LLM_MODEL: gpt-4.1-mini
  LANGSMITH_TRACING: "true"
  LANGSMITH_PROJECT: synapseos
  REDIS_URL: redis://redis:6379/0
  VECTOR_BACKEND: qdrant
  QDRANT_URL: http://qdrant:6333
  QDRANT_COLLECTION: synapseos_knowledge
  HUMAN_APPROVAL_REQUIRED_RISK_SCORE: "0.72"
