apiVersion: apps/v1
kind: Deployment
metadata:
  name: synapseos-api
  namespace: synapseos
  labels:
    app: synapseos-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: synapseos-api
  template:
    metadata:
      labels:
        app: synapseos-api
    spec:
      containers:
        - name: api
          image: ghcr.io/shivacharanteja10/synapseos:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: synapseos-config
            - secretRef:
                name: synapseos-secrets
          readinessProbe:
            httpGet:
              path: /api/v1/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
