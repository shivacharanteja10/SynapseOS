services:
  api:
    build: .
    container_name: synapseos-api
    env_file:
      - .env.example
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://synapseos:synapseos@postgres:5432/synapseos
      QDRANT_URL: http://qdrant:6333
      VECTOR_BACKEND: qdrant
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./src:/app/src:ro

  redis:
    image: redis:7-alpine
    container_name: synapseos-redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    container_name: synapseos-postgres
    environment:
      POSTGRES_DB: synapseos
      POSTGRES_USER: synapseos
      POSTGRES_PASSWORD: synapseos
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapseos -d synapseos"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.10.1
    container_name: synapseos-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  postgres-data:
  qdrant-data:
