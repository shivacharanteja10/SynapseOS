name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: synapseos
          POSTGRES_USER: synapseos
          POSTGRES_PASSWORD: synapseos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U synapseos -d synapseos"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Type check
        run: mypy src

      - name: Test
        env:
          ENVIRONMENT: test
          LLM_PROVIDER: mock
          VECTOR_BACKEND: memory
          REDIS_URL: redis://localhost:6379/0
          DATABASE_URL: postgresql+asyncpg://synapseos:synapseos@localhost:5432/synapseos
        run: pytest -q

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build image
        run: docker build -t synapseos:ci .
